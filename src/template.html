<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Todoroki: Todo List</title>
</head>
<body>

<div id="sidebar-backdrop"></div>
<div id="layout">
	<div id="sidebar"></div>

	<div id="main">
		<div id="main-header">
			<button id="sidebar-toggle-btn" title="Toggle menu" aria-label="Toggle sidebar"><span></span></button>
			<h2 id="project-title"></h2>
			<div id="header-actions">
				<button id="add-todo-btn">+ Add Todo</button>
				<button id="theme-toggle-btn" title="Switch to dark mode"></button>
			</div>
		</div>
		<div id="form-container"></div>
		<div id="sort-bar-container"></div>
		<div id="app"></div>
	</div>
</div>

</body>
</html>
