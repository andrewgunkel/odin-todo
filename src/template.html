<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css?family=" rel="stylesheet" type="text/css">
    <!--<link rel="icon" type="image/svg+xml" href="images/favicon.svg">-->
    <title></title>
</head>
<body>

    <form id="new-todo-form">

					<form id="todo-form">

	<div class="form-group">
		<label for="todo-title" class="form-label">Title:</label>
		<input type="text" id="todo-title" name="todo-title" required placeholder="Walking my dragon">
	</div>

	<div class="form-group">
		<label for="todo-description" class="form-label">Description:</label>
		<input type="text" id="todo-description" name="todo-description" required placeholder="She gets fiery if I don't walk her">
	</div>

	<div class="form-group">
		<label for="todo-dueDate" class="form-label">Due Date:</label>
		<input type="date" id="todo-dueDate" name="todo-dueDate">
	</div>

	<div class="form-group">
		<label for="todo-priority" class="form-label">Priority:</label>
		<select id="todo-priority" name="todo-priority">
			<option value="Low">Low</option>
			<option value="Medium">Medium</option>
			<option value="High">High</option>
		</select>
	</div>

	<div class="form-group">
		<label for="todo-notes" class="form-label">Notes:</label>
		<textarea id="todo-notes" name="todo-notes" rows="3" placeholder="Extra details..."></textarea>
	</div>

	<div class="form-group">
		<label for="todo-checklist" class="form-label">Checklist (comma separated):</label>
		<input type="text" id="todo-checklist" name="todo-checklist" placeholder="Buy leash, Find dragon, Avoid villagers">
	</div>

	<div class="form-group">
		<label for="todo-link" class="form-label">Reference Link:</label>
		<input type="url" id="todo-link" name="todo-link" placeholder="https://example.com">
	</div>

	<div class="form-group">
		<label for="todo-status" class="form-label">Status:</label>
		<select id="todo-status" name="todo-status">
			<option value="Not Started">Not Started</option>
			<option value="In Progress">In Progress</option>
			<option value="Completed">Completed</option>
		</select>
	</div>

	<button type="submit">Add Todo</button>
    </form>

</form>

</body>
</html>
